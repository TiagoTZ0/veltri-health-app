version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=veltri_db
      - POSTGRES_USER=veltri_user
      - POSTGRES_PASSWORD=veltri_pass
    ports:
      - "5432:5432"

  ai:
    build: ./ai-service
    volumes:
      - ./ai-service/models:/app/models
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build: ./backend
    command: /app/entrypoint.sh
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=veltri_db
      - DB_USER=veltri_user
      - DB_PASSWORD=veltri_pass
      - ML_API_URL=http://ai:8001/predict/
    depends_on:
      - db
      - ai

volumes:
  postgres_data:
